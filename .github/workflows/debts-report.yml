name: Tuesday Debts Report

on:
  schedule:
    - cron: '0 4 * * 2'
  workflow_dispatch:

jobs:
  send-debts-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: node debts-report.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_FINANCE: ${{ secrets.TG_CHAT_FINANCE }}
          TG_THREAD_FINANCE: ${{ secrets.TG_THREAD_FINANCE }}
