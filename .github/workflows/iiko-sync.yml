name: iiko Sync

on:
  workflow_dispatch:
    inputs:
      sync_date:
        description: 'Date to sync (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''

jobs:
  sync-iiko:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: node iiko-sync.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          IIKO_API_KEY: ${{ secrets.IIKO_API_KEY }}
          IIKO_APP_ID: ${{ secrets.IIKO_APP_ID }}
          IIKO_CLIENT_SECRET: ${{ secrets.IIKO_CLIENT_SECRET }}
          IIKO_ORG_ID: ${{ secrets.IIKO_ORG_ID }}
          SYNC_DATE: ${{ github.event.inputs.sync_date }}
